# Server
server.port=${PORT:8085}

# Database PostgreSQL (Render)
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
app.jwt.secret=${JWT_SECRET:BacPrepAlfaConseilSecretKey2024SuperSecureJWTTokenKeyForMauritaniaBaccalaureat}
app.jwt.expiration=86400000

# AI
app.anthropic.api-key=${ANTHROPIC_API_KEY:YOUR_API_KEY_HERE}
app.anthropic.model=claude-sonnet-4-6
app.anthropic.api-url=https://api.anthropic.com/v1/messages

# CORS - Autoriser le frontend Vercel
app.cors.allowed-origins=${FRONTEND_URL:https://plateforme-alfa.vercel.app}

# Multipart
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.alfaconseil=INFO