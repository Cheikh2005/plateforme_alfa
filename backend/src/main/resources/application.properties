# Server
server.port=8085

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/defi_4?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=BacPrepAlfaConseilSecretKey2024SuperSecureJWTTokenKeyForMauritaniaBaccalauréat
app.jwt.expiration=86400000

# AI - Anthropic Claude API (optionnel)
app.anthropic.api-key=YOUR_API_KEY_HERE
app.anthropic.model=claude-sonnet-4-6
